<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <!-- Diamond pattern for header strip -->
    <pattern id="dp_toc" x="720" y="0" width="110" height="88" patternUnits="userSpaceOnUse">
      <polygon points="0,32 12,0 102,0 90,32" fill="#CC4500" fill-opacity="0.85"/>
      <polygon points="55,76 67,44 157,44 145,76" fill="#CC4500" fill-opacity="0.65"/>
      <polygon points="-55,76 -43,44 47,44 35,76" fill="#CC4500" fill-opacity="0.65"/>
    </pattern>
    <linearGradient id="toc_hdr_fade" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C8161D"/>
      <stop offset="100%" stop-color="#C8161D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header strip: red background -->
  <rect x="0" y="0" width="1280" height="72" fill="#C8161D"/>

  <!-- Diamond pattern in header (right portion) -->
  <rect x="720" y="0" width="560" height="72" fill="url(#dp_toc)"/>

  <!-- Fade at left edge of header pattern -->
  <rect x="720" y="0" width="120" height="72" fill="url(#toc_hdr_fade)"/>

  <!-- CETC logo image in header (right-aligned) -->
  <image href="cetc_logo.png" x="1118" y="16" width="98" height="40" preserveAspectRatio="xMidYMid meet"/>

  <!-- Header: page label -->
  <text x="64" y="44" fill="#FFFFFF"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="20" font-weight="700">目  录</text>
  <text x="118" y="44" fill="#FFFFFF" fill-opacity="0.7"
        font-family="Arial, sans-serif" font-size="13" letter-spacing="2">CONTENTS</text>

  <!-- TOC items: 6 rows -->
  <!-- Item 1 -->
  <rect x="64" y="104" width="4" height="32" fill="#C8161D"/>
  <text x="82" y="128" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_1_TITLE}}</text>
  <text x="1180" y="128" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_1_PAGE}}</text>
  <line x1="82" y1="144" x2="1180" y2="144" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Item 2 -->
  <rect x="64" y="160" width="4" height="32" fill="#C8161D" fill-opacity="0.5"/>
  <text x="82" y="184" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_2_TITLE}}</text>
  <text x="1180" y="184" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_2_PAGE}}</text>
  <line x1="82" y1="200" x2="1180" y2="200" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Item 3 -->
  <rect x="64" y="216" width="4" height="32" fill="#C8161D" fill-opacity="0.5"/>
  <text x="82" y="240" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_3_TITLE}}</text>
  <text x="1180" y="240" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_3_PAGE}}</text>
  <line x1="82" y1="256" x2="1180" y2="256" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Item 4 -->
  <rect x="64" y="272" width="4" height="32" fill="#C8161D" fill-opacity="0.5"/>
  <text x="82" y="296" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_4_TITLE}}</text>
  <text x="1180" y="296" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_4_PAGE}}</text>
  <line x1="82" y1="312" x2="1180" y2="312" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Item 5 -->
  <rect x="64" y="328" width="4" height="32" fill="#C8161D" fill-opacity="0.5"/>
  <text x="82" y="352" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_5_TITLE}}</text>
  <text x="1180" y="352" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_5_PAGE}}</text>
  <line x1="82" y1="368" x2="1180" y2="368" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Item 6 -->
  <rect x="64" y="384" width="4" height="32" fill="#C8161D" fill-opacity="0.5"/>
  <text x="82" y="408" fill="#1A1A1A"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="18" font-weight="700">{{TOC_ITEM_6_TITLE}}</text>
  <text x="1180" y="408" text-anchor="end" fill="#C8161D"
        font-family="Arial, sans-serif" font-size="16" font-weight="700">{{TOC_ITEM_6_PAGE}}</text>
  <line x1="82" y1="424" x2="1180" y2="424" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Footer bar -->
  <rect x="0" y="704" width="1060" height="16" fill="#C8161D"/>
  <rect x="1060" y="704" width="220" height="16" fill="#595959"/>
</svg>
