<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <!-- Diamond pattern: 110x88 tile, two staggered rows -->
    <pattern id="dp_cover" x="380" y="16" width="110" height="88" patternUnits="userSpaceOnUse">
      <polygon points="0,32 12,0 102,0 90,32" fill="#CC4500" fill-opacity="0.85"/>
      <polygon points="55,76 67,44 157,44 145,76" fill="#CC4500" fill-opacity="0.65"/>
      <polygon points="-55,76 -43,44 47,44 35,76" fill="#CC4500" fill-opacity="0.65"/>
    </pattern>
    <!-- Fade-in gradient for left edge of pattern area -->
    <linearGradient id="cover_fade" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C8161D"/>
      <stop offset="100%" stop-color="#C8161D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full red background -->
  <rect width="1280" height="720" fill="#C8161D"/>

  <!-- Diamond pattern overlay (right 70% of slide) -->
  <rect x="380" y="0" width="900" height="720" fill="url(#dp_cover)"/>

  <!-- Fade gradient: blends pattern into solid red on left edge -->
  <rect x="380" y="0" width="180" height="720" fill="url(#cover_fade)"/>

  <!-- Darker bottom bar -->
  <rect x="0" y="638" width="1280" height="82" fill="#9B1019" fill-opacity="0.55"/>

  <!-- Left-side red overlay to keep text area clean -->
  <rect x="0" y="0" width="68" height="720" fill="#C8161D"/>

  <!-- Accent rule above title -->
  <rect x="64" y="218" width="6" height="72" fill="#FFFFFF" fill-opacity="0.9"/>
  <rect x="80" y="226" width="320" height="3" fill="#FFFFFF" fill-opacity="0.4"/>

  <!-- TITLE -->
  <text x="80" y="278" fill="#FFFFFF"
        font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
        font-size="48" font-weight="700" letter-spacing="2">{{TITLE}}</text>

  <!-- SUBTITLE -->
  <text x="80" y="334" fill="#FFFFFF" fill-opacity="0.92"
        font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="400">{{SUBTITLE}}</text>

  <!-- Divider line -->
  <rect x="80" y="370" width="340" height="1.5" fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- AUTHOR -->
  <text x="80" y="428" fill="#FFFFFF" fill-opacity="0.88"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="17">汇报人：{{AUTHOR}}</text>

  <!-- DATE -->
  <text x="80" y="458" fill="#FFFFFF" fill-opacity="0.72"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
        font-size="15">{{DATE}}</text>

  <!-- Bottom bar: CETC text logo + slogans -->
  <!-- CETC logo image -->
  <image href="cetc_logo.png" x="64" y="644" width="110" height="45" preserveAspectRatio="xMidYMid meet"/>

  <!-- Vertical divider -->
  <line x1="184" y1="651" x2="184" y2="675" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Slogans -->
  <text x="194" y="668" fill="#FFFFFF" fill-opacity="0.82"
        font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12">
    以人为本  |  聚焦市场  |  持续改革  |  创新驱动  |  简单务实
  </text>
</svg>
