<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="topAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f5597"/>
      <stop offset="100%" stop-color="#3f629f"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <rect x="0" y="0" width="1280" height="4" fill="url(#topAccent)"/>

  <rect x="0" y="716" width="1280" height="4" fill="#3f629f"/>

  <rect x="60" y="280" width="1160" height="2" fill="#d6e4f0"/>

  <text x="640" y="230" text-anchor="middle" font-size="50" font-weight="bold" fill="#2f5597" font-family="Microsoft YaHei, SimHei, sans-serif">{{TITLE}}</text>

  <text x="640" y="290" text-anchor="middle" font-size="28" font-weight="bold" fill="#2f5597" font-family="Microsoft YaHei, SimHei, sans-serif">{{SUBTITLE}}</text>

  <text x="640" y="380" text-anchor="middle" font-size="24" fill="#666666" font-family="Microsoft YaHei, SimHei, sans-serif">{{AUTHOR}}</text>

  <text x="640" y="420" text-anchor="middle" font-size="24" fill="#666666" font-family="Microsoft YaHei, SimHei, sans-serif">{{DATE}}</text>

  <rect x="560" y="500" width="160" height="3" rx="1" fill="#3f629f"/>
</svg>