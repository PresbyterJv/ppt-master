<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Content Page — Terraria Pixel Forest Theme (Bright) -->

  <!-- Light sky-blue background (bright theme, no image) -->
  <rect width="1280" height="720" fill="#C8E0F8"/>

  <!-- Subtle upper-sky lighter band -->
  <rect x="0" y="0" width="1280" height="100" fill="#DDEEFF" fill-opacity="0.50"/>

  <!-- ===== TOP PIXEL BORDER STRIP ===== -->
  <!-- Grass-tile style top border -->
  <rect x="0" y="0" width="1280" height="10" fill="#3EAA4A"/>
  <rect x="0" y="10" width="1280" height="6" fill="#2D6B34"/>

  <!-- ===== HEADER BAR ===== -->
  <rect x="0" y="16" width="1280" height="80" fill="#4A7CB4"/>
  <!-- Header top highlight -->
  <rect x="0" y="16" width="1280" height="10" fill="#6A9CD4"/>
  <!-- Header bottom shadow -->
  <rect x="0" y="88" width="1280" height="6" fill="#2A5080" fill-opacity="0.50"/>

  <!-- Header pixel left block accents -->
  <rect x="16" y="30" width="14" height="14" fill="#FFD700"/>
  <rect x="34" y="30" width="14" height="14" fill="#FFD700" fill-opacity="0.55"/>
  <rect x="52" y="30" width="14" height="14" fill="#FFD700" fill-opacity="0.25"/>

  <!-- Header: small tree icon (right side) -->
  <image href="tree.png" x="1200" y="16" width="56" height="80" preserveAspectRatio="xMidYMid meet"/>

  <!-- Page title text -->
  <text x="82" y="70" font-family="Courier New, Consolas, Monaco, monospace" font-size="36" font-weight="bold" fill="#FFFFFF">{{PAGE_TITLE}}</text>

  <!-- ===== CONTENT PANEL ===== -->
  <!-- Outer dark border (pixel art frame) -->
  <rect x="38" y="106" width="1204" height="558" fill="#1A0D00"/>
  <!-- Inner cream/warm background -->
  <rect x="46" y="114" width="1188" height="542" fill="#F8F3E8"/>
  <!-- Top highlight bar -->
  <rect x="46" y="114" width="1188" height="10" fill="#FFFFFF"/>
  <!-- Left highlight bar -->
  <rect x="46" y="114" width="10" height="542" fill="#FFFFFF"/>
  <!-- Bottom shadow bar -->
  <rect x="46" y="646" width="1188" height="10" fill="#D8CCB0"/>
  <!-- Right shadow bar -->
  <rect x="1224" y="114" width="10" height="542" fill="#D8CCB0"/>

  <!-- Inner top rule under highlight -->
  <rect x="58" y="126" width="1164" height="2" fill="#C8B890" fill-opacity="0.50"/>

  <!-- Content area placeholder -->
  <text x="640" y="388" text-anchor="middle" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="22" fill="#A09880">{{CONTENT_AREA}}</text>

  <!-- ===== FOOTER BAR ===== -->
  <rect x="0" y="672" width="1280" height="48" fill="#2D6B34"/>
  <!-- Footer top grass highlight -->
  <rect x="0" y="672" width="1280" height="9" fill="#3EAA4A"/>

  <!-- Footer: small slime decoration (left) -->
  <image href="green_slime.png" x="28" y="673" width="46" height="40" preserveAspectRatio="xMidYMid meet"/>

  <!-- Footer: section name (left) -->
  <text x="88" y="706" font-family="Courier New, Consolas, monospace" font-size="17" fill="#7ACA5A">{{SECTION_NAME}}</text>

  <!-- Footer: page number (right) -->
  <text x="1236" y="706" text-anchor="end" font-family="Courier New, Consolas, monospace" font-size="20" font-weight="bold" fill="#A0E060">{{PAGE_NUM}}</text>

  <!-- Footer: small boulder right of page number -->
  <image href="boulder.png" x="1242" y="674" width="34" height="32" preserveAspectRatio="xMidYMid meet"/>
</svg>
