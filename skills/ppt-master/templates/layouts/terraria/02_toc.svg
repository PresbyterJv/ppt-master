<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- TOC Page — Terraria Pixel Forest Theme -->

  <!-- Light sky-blue background (bright theme) -->
  <rect width="1280" height="720" fill="#C8E0F8"/>

  <!-- Subtle sky gradient simulation (lighter at top) -->
  <rect x="0" y="0" width="1280" height="360" fill="#DDEEFF" fill-opacity="0.40"/>

  <!-- Horizon — light green meadow strip -->
  <rect x="0" y="600" width="1280" height="120" fill="#B8D4A0"/>
  <!-- Ground grass top -->
  <rect x="0" y="660" width="1280" height="60" fill="#2A6030"/>
  <rect x="0" y="660" width="1280" height="10" fill="#3EAA4A"/>
  <!-- Dirt below grass -->
  <rect x="0" y="670" width="1280" height="50" fill="#3A2010"/>

  <!-- Left-side tall tree decoration (behind panel) -->
  <image href="tree_forest.png" x="-8" y="340" width="78" height="320" preserveAspectRatio="xMidYMax meet"/>
  <image href="tree_forest.png" x="48" y="370" width="66" height="290" preserveAspectRatio="xMidYMax meet"/>

  <!-- Right-side tall tree decoration (behind panel) -->
  <image href="tree_forest.png" x="1214" y="340" width="78" height="320" preserveAspectRatio="xMidYMax meet"/>
  <image href="tree_forest.png" x="1166" y="370" width="66" height="290" preserveAspectRatio="xMidYMax meet"/>

  <!-- ===== MAIN TOC PANEL ===== -->
  <!-- Outer dark border -->
  <rect x="125" y="52" width="1030" height="608" fill="#1A0D00"/>
  <!-- Inner cream/warm fill -->
  <rect x="133" y="60" width="1014" height="592" fill="#F7F0E0"/>
  <!-- Top highlight -->
  <rect x="133" y="60" width="1014" height="14" fill="#FFFFFF"/>
  <!-- Left highlight -->
  <rect x="133" y="60" width="14" height="592" fill="#F5F5F0"/>
  <!-- Bottom shadow -->
  <rect x="133" y="638" width="1014" height="14" fill="#D8CEB8"/>
  <!-- Right shadow -->
  <rect x="1133" y="60" width="14" height="592" fill="#D8CEB8"/>

  <!-- Gold corner pixels -->
  <rect x="137" y="64" width="14" height="14" fill="#FFD700"/>
  <rect x="1129" y="64" width="14" height="14" fill="#FFD700"/>
  <rect x="137" y="634" width="14" height="14" fill="#FFD700"/>
  <rect x="1129" y="634" width="14" height="14" fill="#FFD700"/>

  <!-- ===== HEADER BAR ===== -->
  <rect x="133" y="60" width="1014" height="86" fill="#4A7CB4"/>
  <!-- Header top highlight -->
  <rect x="133" y="60" width="1014" height="12" fill="#6A9CD4"/>
  <!-- Header bottom shadow -->
  <rect x="133" y="132" width="1014" height="8" fill="#2A5080" fill-opacity="0.60"/>

  <!-- Header pixel left accents -->
  <rect x="148" y="76" width="14" height="14" fill="#FFD700"/>
  <rect x="166" y="76" width="14" height="14" fill="#FFD700" fill-opacity="0.60"/>
  <rect x="184" y="76" width="14" height="14" fill="#FFD700" fill-opacity="0.30"/>

  <!-- Header title -->
  <text x="640" y="118" text-anchor="middle" font-family="Courier New, Consolas, Monaco, monospace" font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="6">CONTENTS</text>

  <!-- ===== TOC ITEM ROWS ===== -->
  <!-- Item 1 (alternate bg: slightly darker) -->
  <g>
    <rect x="133" y="154" width="1014" height="72" fill="#EBE4D0"/>
    <!-- Green pixel bullet -->
    <rect x="164" y="176" width="22" height="22" fill="#3EAA4A"/>
    <rect x="170" y="182" width="10" height="10" fill="#70D070" fill-opacity="0.65"/>
    <!-- Item number -->
    <text x="218" y="198" font-family="Courier New, Consolas, monospace" font-size="26" font-weight="bold" fill="#4A7CB4">01</text>
    <!-- Item title -->
    <text x="278" y="198" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="24" fill="#2A1A0A">{{TOC_ITEM_1_TITLE}}</text>
    <!-- Dotted tab line -->
    <rect x="790" y="186" width="290" height="2" fill="#9A8F78" fill-opacity="0.45"/>
  </g>

  <!-- Item 2 (lighter) -->
  <g>
    <rect x="133" y="226" width="1014" height="72" fill="#F7F0E0"/>
    <rect x="164" y="248" width="22" height="22" fill="#3EAA4A"/>
    <rect x="170" y="254" width="10" height="10" fill="#70D070" fill-opacity="0.65"/>
    <text x="218" y="270" font-family="Courier New, Consolas, monospace" font-size="26" font-weight="bold" fill="#4A7CB4">02</text>
    <text x="278" y="270" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="24" fill="#2A1A0A">{{TOC_ITEM_2_TITLE}}</text>
    <rect x="790" y="258" width="290" height="2" fill="#9A8F78" fill-opacity="0.45"/>
  </g>

  <!-- Item 3 (alternate) -->
  <g>
    <rect x="133" y="298" width="1014" height="72" fill="#EBE4D0"/>
    <rect x="164" y="320" width="22" height="22" fill="#3EAA4A"/>
    <rect x="170" y="326" width="10" height="10" fill="#70D070" fill-opacity="0.65"/>
    <text x="218" y="342" font-family="Courier New, Consolas, monospace" font-size="26" font-weight="bold" fill="#4A7CB4">03</text>
    <text x="278" y="342" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="24" fill="#2A1A0A">{{TOC_ITEM_3_TITLE}}</text>
    <rect x="790" y="330" width="290" height="2" fill="#9A8F78" fill-opacity="0.45"/>
  </g>

  <!-- Item 4 (lighter) -->
  <g>
    <rect x="133" y="370" width="1014" height="72" fill="#F7F0E0"/>
    <rect x="164" y="392" width="22" height="22" fill="#3EAA4A"/>
    <rect x="170" y="398" width="10" height="10" fill="#70D070" fill-opacity="0.65"/>
    <text x="218" y="414" font-family="Courier New, Consolas, monospace" font-size="26" font-weight="bold" fill="#4A7CB4">04</text>
    <text x="278" y="414" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="24" fill="#2A1A0A">{{TOC_ITEM_4_TITLE}}</text>
    <rect x="790" y="402" width="290" height="2" fill="#9A8F78" fill-opacity="0.45"/>
  </g>

  <!-- Item 5 (alternate) -->
  <g>
    <rect x="133" y="442" width="1014" height="72" fill="#EBE4D0"/>
    <rect x="164" y="464" width="22" height="22" fill="#3EAA4A"/>
    <rect x="170" y="470" width="10" height="10" fill="#70D070" fill-opacity="0.65"/>
    <text x="218" y="486" font-family="Courier New, Consolas, monospace" font-size="26" font-weight="bold" fill="#4A7CB4">05</text>
    <text x="278" y="486" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="24" fill="#2A1A0A">{{TOC_ITEM_5_TITLE}}</text>
    <rect x="790" y="474" width="290" height="2" fill="#9A8F78" fill-opacity="0.45"/>
  </g>

  <!-- ===== PANEL BOTTOM DECORATION AREA ===== -->
  <rect x="133" y="514" width="1014" height="138" fill="#F7F0E0"/>

  <!-- Bottom separator in panel -->
  <rect x="150" y="522" width="980" height="3" fill="#C8B890" fill-opacity="0.70"/>

  <!-- Small boulder decoration (bottom-left of panel) -->
  <image href="boulder.png" x="158" y="556" width="52" height="48" preserveAspectRatio="xMidYMid meet"/>

  <!-- Small green slime decoration (bottom-right of panel) -->
  <image href="green_slime.png" x="1080" y="554" width="54" height="46" preserveAspectRatio="xMidYMid meet"/>

  <!-- Pixel decorative text at bottom of panel -->
  <text x="640" y="600" text-anchor="middle" font-family="Courier New, Consolas, monospace" font-size="14" fill="#9A8F70">[ SELECT YOUR QUEST ]</text>
</svg>
