<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Chapter Page — Terraria Pixel Forest Theme -->

  <!-- Background fallback -->
  <rect width="1280" height="720" fill="#4B6FA8"/>

  <!-- Forest background: pine trees, dramatic — xMidYMin to show sky -->
  <image href="forest_bg1.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMin slice"/>

  <!-- Right-side forest brightening: let the natural forest show clearly -->
  <rect x="520" y="0" width="760" height="720" fill="#B8D8F8" fill-opacity="0.08"/>

  <!-- ===== LEFT CHAPTER INFO PANEL ===== -->
  <!-- Dark forest-green panel overlay (left ~41% of slide) -->
  <rect x="0" y="0" width="528" height="720" fill="#0E2514" fill-opacity="0.91"/>

  <!-- Panel right border (pixel art grass/vine style) -->
  <rect x="519" y="0" width="9" height="720" fill="#2D6B34"/>
  <rect x="510" y="0" width="9" height="720" fill="#1A4D2A"/>

  <!-- Pixel corner decoration (top-left) -->
  <rect x="20" y="20" width="16" height="16" fill="#FFD700"/>
  <rect x="40" y="20" width="16" height="16" fill="#FFD700" fill-opacity="0.60"/>
  <rect x="20" y="40" width="16" height="16" fill="#FFD700" fill-opacity="0.60"/>
  <rect x="60" y="20" width="16" height="16" fill="#FFD700" fill-opacity="0.25"/>
  <rect x="20" y="60" width="16" height="16" fill="#FFD700" fill-opacity="0.25"/>

  <!-- Pixel corner decoration (bottom-left) -->
  <rect x="20" y="684" width="16" height="16" fill="#3EAA4A"/>
  <rect x="40" y="684" width="16" height="16" fill="#3EAA4A" fill-opacity="0.60"/>
  <rect x="20" y="664" width="16" height="16" fill="#3EAA4A" fill-opacity="0.60"/>

  <!-- "CHAPTER" label -->
  <text x="265" y="108" text-anchor="middle" font-family="Courier New, Consolas, monospace" font-size="16" fill="#5A9040" letter-spacing="8">- CHAPTER -</text>

  <!-- Chapter number (large gold) -->
  <text x="265" y="272" text-anchor="middle" font-family="Courier New, Consolas, Monaco, monospace" font-size="138" font-weight="bold" fill="#FFD700">{{CHAPTER_NUM}}</text>

  <!-- Divider: pixel-style gold bar -->
  <rect x="60" y="300" width="400" height="6" fill="#FFD700" fill-opacity="0.65"/>
  <rect x="55" y="295" width="12" height="16" fill="#FFD700" fill-opacity="0.80"/>
  <rect x="453" y="295" width="12" height="16" fill="#FFD700" fill-opacity="0.80"/>

  <!-- Chapter title -->
  <text x="265" y="378" text-anchor="middle" font-family="Courier New, Consolas, Monaco, monospace" font-size="34" font-weight="bold" fill="#FFFFFF">{{CHAPTER_TITLE}}</text>

  <!-- Chapter description (smaller, optional) -->
  <text x="265" y="440" text-anchor="middle" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="18" fill="#90B880">{{CHAPTER_DESC}}</text>

  <!-- Bottom ground strip inside panel -->
  <rect x="0" y="686" width="519" height="34" fill="#3A2010"/>
  <rect x="0" y="686" width="519" height="9" fill="#3EAA4A"/>

  <!-- Small slime in bottom of panel -->
  <image href="green_slime.png" x="434" y="634" width="62" height="52" preserveAspectRatio="xMidYMid meet"/>

  <!-- ===== RIGHT SIDE DECORATIONS (on forest background) ===== -->
  <!-- Tall thin tree_forest decoration at far right -->
  <image href="tree_forest.png" x="1192" y="368" width="68" height="286" preserveAspectRatio="xMidYMax meet"/>

  <!-- Small tree decoration peeking from right edge mid-frame -->
  <image href="tree.png" x="548" y="478" width="52" height="96" preserveAspectRatio="xMidYMax meet"/>

  <!-- Ground strip continuation on right side -->
  <rect x="519" y="686" width="761" height="34" fill="#3A2010" fill-opacity="0.70"/>
  <rect x="519" y="686" width="761" height="9" fill="#3EAA4A" fill-opacity="0.70"/>
</svg>
