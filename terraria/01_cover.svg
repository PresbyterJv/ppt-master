<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Cover Page — Terraria Pixel Forest Theme -->

  <!-- Background fallback color (sky blue) -->
  <rect width="1280" height="720" fill="#5578B4"/>

  <!-- Forest background: deciduous trees, bright sky, xMidYMin to preserve sky at top -->
  <image href="forest_bg2.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMin slice"/>

  <!-- Sky-area overlay: subtle brightening for logo legibility -->
  <rect x="0" y="0" width="1280" height="240" fill="#B8D8F8" fill-opacity="0.20"/>

  <!-- ===== TERRARIA LOGO (required cover decoration) ===== -->
  <g>
    <image href="logo.png" x="310" y="12" width="660" height="198" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- ===== CENTRAL TITLE PANEL (Pixel-Art Wooden Chest Style) ===== -->
  <g>
    <!-- Outer border (dark pixel frame) -->
    <rect x="145" y="224" width="990" height="264" fill="#1A0D00"/>
    <!-- Inner panel fill (wooden brown) -->
    <rect x="153" y="232" width="974" height="248" fill="#5C3A1E"/>
    <!-- Top highlight strip (lighter wood) -->
    <rect x="153" y="232" width="974" height="14" fill="#8C5A32"/>
    <!-- Left highlight strip -->
    <rect x="153" y="232" width="14" height="248" fill="#7A4A28"/>
    <!-- Bottom shadow strip -->
    <rect x="153" y="466" width="974" height="10" fill="#3A1E08"/>
    <!-- Right shadow strip -->
    <rect x="1113" y="232" width="14" height="248" fill="#3A1E08"/>

    <!-- Gold corner pixels (Terraria UI accent) -->
    <rect x="157" y="236" width="14" height="14" fill="#FFD700"/>
    <rect x="1109" y="236" width="14" height="14" fill="#FFD700"/>
    <rect x="157" y="462" width="14" height="14" fill="#FFD700"/>
    <rect x="1109" y="462" width="14" height="14" fill="#FFD700"/>

    <!-- Inner gold border line (top) -->
    <rect x="173" y="251" width="934" height="2" fill="#FFD700" fill-opacity="0.35"/>

    <!-- Main title text -->
    <text x="640" y="340" text-anchor="middle" font-family="Courier New, Consolas, Monaco, monospace" font-size="54" font-weight="bold" fill="#FFD700">{{TITLE}}</text>

    <!-- Divider line with pixel dots -->
    <rect x="220" y="366" width="840" height="4" fill="#FFD700" fill-opacity="0.50"/>
    <rect x="215" y="362" width="12" height="12" fill="#FFD700" fill-opacity="0.60"/>
    <rect x="1053" y="362" width="12" height="12" fill="#FFD700" fill-opacity="0.60"/>

    <!-- Subtitle text -->
    <text x="640" y="424" text-anchor="middle" font-family="Courier New, Consolas, Monaco, monospace" font-size="27" fill="#F0E0C0">{{SUBTITLE}}</text>
  </g>

  <!-- ===== BOTTOM INFO STRIP (Ground + Dark Overlay) ===== -->
  <!-- Dark overlay for info readability -->
  <rect x="0" y="498" width="1280" height="222" fill="#071306" fill-opacity="0.84"/>

  <!-- Grass border at top of info strip -->
  <rect x="0" y="498" width="1280" height="8" fill="#3EAA4A"/>
  <rect x="0" y="506" width="1280" height="5" fill="#2D6B34"/>

  <!-- Ground tiles at very bottom -->
  <rect x="0" y="686" width="1280" height="34" fill="#3A2010"/>
  <rect x="0" y="686" width="1280" height="9" fill="#3EAA4A"/>

  <!-- Bottom info content -->
  <g>
    <!-- Left boulder decoration -->
    <image href="boulder.png" x="32" y="518" width="54" height="50" preserveAspectRatio="xMidYMid meet"/>
    <!-- Left slime -->
    <image href="green_slime.png" x="94" y="516" width="64" height="54" preserveAspectRatio="xMidYMid meet"/>

    <!-- Right slime -->
    <image href="green_slime.png" x="1122" y="516" width="64" height="54" preserveAspectRatio="xMidYMid meet"/>
    <!-- Right boulder decoration -->
    <image href="boulder.png" x="1194" y="518" width="54" height="50" preserveAspectRatio="xMidYMid meet"/>

    <!-- Date label -->
    <text x="190" y="548" font-family="Courier New, Consolas, monospace" font-size="13" fill="#6A9050">DATE</text>
    <!-- Date value -->
    <text x="190" y="578" font-family="Courier New, Consolas, monospace" font-size="22" font-weight="bold" fill="#A0E060">{{DATE}}</text>

    <!-- Author label -->
    <text x="1090" y="548" text-anchor="end" font-family="Courier New, Consolas, monospace" font-size="13" fill="#6A9050">AUTHOR</text>
    <!-- Author value -->
    <text x="1090" y="578" text-anchor="end" font-family="Courier New, Consolas, monospace" font-size="22" font-weight="bold" fill="#A0E060">{{AUTHOR}}</text>

    <!-- Small tree decorations in info strip -->
    <image href="tree.png" x="24" y="600" width="46" height="86" preserveAspectRatio="xMidYMax meet"/>
    <image href="tree.png" x="1210" y="600" width="46" height="86" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
